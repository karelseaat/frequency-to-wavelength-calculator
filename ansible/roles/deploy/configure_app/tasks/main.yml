---
- name: Copy environment configuration
  template:
    src: env.j2
    dest: "{{ app_path }}/.env"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0600'

- name: Generate Laravel application key
  shell: |
    cd {{ app_path }}
    /usr/bin/php{{ php_version }} artisan key:generate --force
  become_user: "{{ app_user }}"
  changed_when: false

- name: Clear application cache
  shell: |
    cd {{ app_path }}
    /usr/bin/php{{ php_version }} artisan config:clear
    /usr/bin/php{{ php_version }} artisan cache:clear
  become_user: "{{ app_user }}"
  changed_when: false
